<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow KB Article Editor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useCallback, useEffect, useMemo } = React;
        
        // Simple icon wrapper component
        const Icon = ({ name, size = 20, className = "" }) => {
          const iconRef = useRef(null);
          
          useEffect(() => {
            if (iconRef.current && lucide[name]) {
              lucide.createIcons({
                icons: { [name]: lucide[name] },
                attrs: { width: size, height: size },
                nameAttr: 'data-lucide'
              });
            }
          }, [name, size]);
          
          return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const ServiceNowKBEditor = () => {
          const [mode, setMode] = useState('IMPORT');
          const [rawHTML, setRawHTML] = useState('');
          const [cleanedHTML, setCleanedHTML] = useState('');
          const [editedHTML, setEditedHTML] = useState('');
          const [originalStats, setOriginalStats] = useState({ chars: 0, tags: 0 });
          const [showPreview, setShowPreview] = useState(false);
          const [notification, setNotification] = useState(null);
          const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
          const [showToolbar, setShowToolbar] = useState(false);
          const [toolbarPosition, setToolbarPosition] = useState({ x: 0, y: 0 });

          const editorRef = useRef(null);
          const importTextareaRef = useRef(null);
          const exportTextareaRef = useRef(null);

          const cleanHTML = useCallback((html) => {
            let cleaned = html;
            
            // Decode HTML entities to make the HTML more readable
            const decodeEntities = (text) => {
              const textarea = document.createElement('textarea');
              textarea.innerHTML = text;
              return textarea.value;
            };
            
            cleaned = decodeEntities(cleaned);
            
            // Remove XML namespace comments
            cleaned = cleaned.replace(/<!--\?xml:namespace[^>]*-->/gi, '');
            
            // Remove Microsoft Office classes (but not from img or div tags)
            cleaned = cleaned.replace(/(<(?!img|div)[^>]+)class="Mso[^"]*"/gi, '$1');
            
            // Remove data-* attributes (but preserve on img and div tags)
            cleaned = cleaned.replace(/(<(?!img|div)[^>]+)\s+data-[a-z-]+="[^"]*"/gi, '$1');
            
            // Remove lang attributes from inline elements (but not img or div)
            cleaned = cleaned.replace(/(<(?:span|strong|em|b|i|u)[^>]*)\s+lang="[^"]*"/gi, '$1');
            
            // Clean inline styles (preserve all styles on img and div tags)
            cleaned = cleaned.replace(/(<(?!img|div)[^>]+)style="([^"]*)"/gi, (match, tagStart, styles) => {
              const cleanedStyles = styles.split(';').filter(style => !style.trim().startsWith('mso-')).join(';');
              return cleanedStyles ? `${tagStart}style="${cleanedStyles}"` : tagStart;
            });
            
            // Remove empty span tags
            cleaned = cleaned.replace(/<span[^>]*>\s*<\/span>/gi, '');
            
            // Collapse nested spans with no semantic value
            let prevCleaned = '';
            while (prevCleaned !== cleaned) {
              prevCleaned = cleaned;
              cleaned = cleaned.replace(/<span([^>]*)>\s*<span([^>]*)>(.*?)<\/span>\s*<\/span>/gi, '<span$2>$3</span>');
            }
            
            // Trim excessive whitespace
            cleaned = cleaned.replace(/\n\s*\n\s*\n/g, '\n\n');
            
            return cleaned.trim();
          }, []);

          const calculateStats = useCallback((html) => {
            return {
              chars: html.length,
              tags: (html.match(/<[^>]+>/g) || []).length
            };
          }, []);

          const showNotification = useCallback((message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3000);
          }, []);

          const handleImport = useCallback(() => {
            if (!rawHTML.trim()) {
              showNotification('Please paste HTML content first', 'error');
              return;
            }
            const cleaned = cleanHTML(rawHTML);
            setCleanedHTML(cleaned);
            setEditedHTML(cleaned);
            setOriginalStats(calculateStats(cleaned));
            setMode('EDIT');
            setHasUnsavedChanges(false);
            showNotification('HTML cleaned and imported successfully');
          }, [rawHTML, cleanHTML, calculateStats, showNotification]);

          const handlePasteFromClipboard = useCallback(async () => {
            try {
              const text = await navigator.clipboard.readText();
              setRawHTML(text);
              showNotification('Pasted from clipboard');
            } catch (err) {
              showNotification('Failed to read from clipboard', 'error');
            }
          }, [showNotification]);

          const handleExport = useCallback(() => {
            if (editorRef.current) {
              setEditedHTML(editorRef.current.innerHTML);
              setMode('EXPORT');
              setHasUnsavedChanges(false);
            }
          }, []);

          const handleCopyToClipboard = useCallback(async () => {
            try {
              await navigator.clipboard.writeText(editedHTML);
              showNotification('Copied to clipboard!');
            } catch (err) {
              showNotification('Failed to copy to clipboard', 'error');
            }
          }, [editedHTML, showNotification]);

          const handleBackToImport = useCallback(() => {
            if (hasUnsavedChanges && !window.confirm('You have unsaved changes. Are you sure?')) return;
            setMode('IMPORT');
            setRawHTML('');
            setCleanedHTML('');
            setEditedHTML('');
            setHasUnsavedChanges(false);
          }, [hasUnsavedChanges]);

          const handleBackToEditor = useCallback(() => setMode('EDIT'), []);

          const handleStartOver = useCallback(() => {
            if (window.confirm('Start over? All changes will be lost.')) {
              setMode('IMPORT');
              setRawHTML('');
              setCleanedHTML('');
              setEditedHTML('');
              setHasUnsavedChanges(false);
            }
          }, []);

          const handleSelectionChange = useCallback(() => {
            const selection = window.getSelection();
            if (selection && !selection.isCollapsed && editorRef.current?.contains(selection.anchorNode)) {
              const range = selection.getRangeAt(0);
              const rect = range.getBoundingClientRect();
              setToolbarPosition({ x: rect.left + rect.width / 2, y: rect.top - 10 });
              setShowToolbar(true);
            } else {
              setShowToolbar(false);
            }
          }, []);

          const execCommand = useCallback((command, value = null) => {
            document.execCommand(command, false, value);
            editorRef.current?.focus();
            setHasUnsavedChanges(true);
          }, []);

          useEffect(() => {
            if (mode === 'EDIT' && editorRef.current) {
              const handleInput = () => setHasUnsavedChanges(true);
              editorRef.current.addEventListener('input', handleInput);
              return () => editorRef.current?.removeEventListener('input', handleInput);
            }
          }, [mode]);

          useEffect(() => {
            if (mode === 'EDIT') {
              document.addEventListener('selectionchange', handleSelectionChange);
              return () => document.removeEventListener('selectionchange', handleSelectionChange);
            }
          }, [mode, handleSelectionChange]);

          useEffect(() => {
            if (mode === 'EDIT' && editorRef.current) {
              editorRef.current.focus();
            }
          }, [mode]);

          const currentStats = useMemo(() => {
            return mode === 'EXPORT' ? calculateStats(editedHTML) : originalStats;
          }, [mode, editedHTML, originalStats, calculateStats]);

          const statsDiff = useMemo(() => {
            if (mode === 'EXPORT') {
              const current = calculateStats(editedHTML);
              return {
                chars: current.chars - originalStats.chars,
                tags: current.tags - originalStats.tags
              };
            }
            return { chars: 0, tags: 0 };
          }, [mode, editedHTML, originalStats, calculateStats]);

          return (
            <div className="min-h-screen bg-slate-900 flex flex-col">
              <header className="bg-slate-800 border-b border-slate-700 px-6 py-4">
                <div className="max-w-7xl mx-auto flex items-center justify-between">
                  <div>
                    <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                      <Icon name="file-code" size={28} />
                      SN Article Editor
                    </h1>
                    <p className="text-slate-400 text-sm mt-1">Visual editor for ServiceNow Knowledge Articles</p>
                  </div>
                  <div className={`px-3 py-1 rounded-full text-sm font-medium ${
                    mode === 'IMPORT' ? 'bg-orange-500/20 text-orange-400' :
                    mode === 'EDIT' ? 'bg-blue-500/20 text-blue-400' :
                    'bg-green-500/20 text-green-400'
                  }`}>
                    {mode}
                  </div>
                </div>
              </header>

              <main className="flex-1 flex flex-col overflow-hidden">
                {mode === 'IMPORT' && (
                  <div className="flex-1 flex flex-col p-8 max-w-6xl mx-auto w-full">
                    <div className="mb-6">
                      <h2 className="text-2xl font-bold text-white mb-2">Import HTML</h2>
                      <p className="text-slate-400">Paste the raw HTML from ServiceNow's source code view</p>
                      <div className="mt-2 p-3 bg-blue-500/10 border border-blue-500/30 rounded text-blue-300 text-sm">
                        <strong>Note:</strong> ServiceNow images (sys_attachment.do) will show as broken here but will work correctly when pasted back into ServiceNow.
                      </div>
                    </div>
                    <div className="flex-1 flex flex-col bg-slate-800 rounded-lg p-4">
                      <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                          <Icon name="file-code" />
                          <span className="text-slate-300 font-medium">HTML Input</span>
                        </div>
                        <div className="flex items-center gap-4">
                          <span className="text-slate-400 text-sm">
                            {rawHTML.length.toLocaleString()} chars
                            {rawHTML && ` • ~${(rawHTML.match(/<[^>]+>/g) || []).length} tags`}
                          </span>
                          {rawHTML && (
                            <button onClick={() => setRawHTML('')} className="text-slate-400 hover:text-white">
                              <Icon name="x" size={18} />
                            </button>
                          )}
                        </div>
                      </div>
                      <textarea
                        ref={importTextareaRef}
                        value={rawHTML}
                        onChange={(e) => setRawHTML(e.target.value)}
                        className="flex-1 bg-slate-900 text-slate-200 font-mono text-sm p-4 rounded border border-slate-700 focus:border-blue-500 focus:outline-none resize-none"
                        placeholder="Paste your HTML here..."
                      />
                      <div className="flex items-center gap-3 mt-4">
                        <button
                          onClick={handlePasteFromClipboard}
                          className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded"
                        >
                          <Icon name="clipboard-paste" size={18} />
                          Paste from Clipboard
                        </button>
                        <button
                          onClick={handleImport}
                          disabled={!rawHTML.trim()}
                          className="flex items-center gap-2 px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded font-medium"
                        >
                          <Icon name="arrow-right" size={18} />
                          Clean & Import
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {mode === 'EDIT' && (
                  <div className="flex-1 flex flex-col">
                    <div className="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <button onClick={handleBackToImport} className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded">
                          <Icon name="arrow-left" size={18} />
                          Back to Import
                        </button>
                        <div className="flex items-center gap-2">
                          <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse" />
                          <span className="text-white font-medium">Visual Editor</span>
                          {hasUnsavedChanges && <span className="text-slate-400 text-sm">(unsaved)</span>}
                        </div>
                      </div>
                      <button onClick={handleExport} className="flex items-center gap-2 px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded font-medium">
                        Export HTML
                        <Icon name="arrow-right" size={18} />
                      </button>
                    </div>
                    <div className="flex-1 overflow-auto bg-slate-700 p-8">
                      <div
                        ref={editorRef}
                        contentEditable
                        suppressContentEditableWarning
                        dangerouslySetInnerHTML={{ __html: cleanedHTML }}
                        className="max-w-4xl mx-auto bg-white p-12 rounded-lg shadow-2xl min-h-[800px] focus:outline-none editor-content"
                        style={{ lineHeight: '1.6', fontSize: '16px', color: '#1e293b' }}
                      />
                    </div>
                  </div>
                )}

                {mode === 'EXPORT' && (
                  <div className="flex-1 flex flex-col p-8 max-w-6xl mx-auto w-full">
                    <div className="mb-6">
                      <h2 className="text-2xl font-bold text-white mb-2">Export HTML</h2>
                      <p className="text-slate-400">Copy the modified HTML and paste it back into ServiceNow</p>
                    </div>
                    <div className="flex-1 flex flex-col bg-slate-800 rounded-lg p-4">
                      <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                          <Icon name="file-text" />
                          <span className="text-slate-300 font-medium">HTML Output</span>
                        </div>
                        <div className="flex items-center gap-4 text-sm">
                          <span className="text-slate-400">
                            {currentStats.chars.toLocaleString()} chars • {currentStats.tags} tags
                          </span>
                          {(statsDiff.chars !== 0 || statsDiff.tags !== 0) && (
                            <span className="text-blue-400">
                              ({statsDiff.chars > 0 ? '+' : ''}{statsDiff.chars} chars, {statsDiff.tags > 0 ? '+' : ''}{statsDiff.tags} tags)
                            </span>
                          )}
                        </div>
                      </div>
                      <textarea
                        ref={exportTextareaRef}
                        value={editedHTML}
                        readOnly
                        className="flex-1 bg-slate-900 text-slate-200 font-mono text-sm p-4 rounded border border-slate-700 resize-none"
                      />
                      <div className="flex items-center justify-between mt-4">
                        <div className="flex items-center gap-3">
                          <button onClick={handleBackToEditor} className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded">
                            <Icon name="arrow-left" size={18} />
                            Back to Editor
                          </button>
                          <button onClick={handleStartOver} className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded">
                            <Icon name="rotate-ccw" size={18} />
                            Start Over
                          </button>
                        </div>
                        <div className="flex items-center gap-3">
                          <button onClick={() => setShowPreview(!showPreview)} className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded">
                            <Icon name={showPreview ? "eye-off" : "eye"} size={18} />
                            {showPreview ? 'Hide' : 'Show'} Preview
                          </button>
                          <button onClick={handleCopyToClipboard} className="flex items-center gap-2 px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded font-medium">
                            <Icon name="clipboard-copy" size={18} />
                            Copy to Clipboard
                          </button>
                        </div>
                      </div>
                      {showPreview && (
                        <div className="mt-4 border-t border-slate-700 pt-4">
                          <div className="flex items-center gap-2 mb-3">
                            <Icon name="eye" size={18} />
                            <span className="text-slate-300 font-medium">Preview</span>
                          </div>
                          <div className="bg-white p-8 rounded max-h-96 overflow-auto">
                            <div dangerouslySetInnerHTML={{ __html: editedHTML }} />
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </main>

              {showToolbar && mode === 'EDIT' && (
                <div
                  className="fixed bg-slate-800 text-white rounded-lg shadow-2xl p-2 flex items-center gap-1 z-40"
                  style={{ left: `${toolbarPosition.x}px`, top: `${toolbarPosition.y}px`, transform: 'translate(-50%, -100%)' }}
                >
                  <button onClick={() => execCommand('bold')} className="p-2 hover:bg-slate-700 rounded" title="Bold">
                    <Icon name="bold" size={16} />
                  </button>
                  <button onClick={() => execCommand('italic')} className="p-2 hover:bg-slate-700 rounded" title="Italic">
                    <Icon name="italic" size={16} />
                  </button>
                  <button onClick={() => execCommand('underline')} className="p-2 hover:bg-slate-700 rounded" title="Underline">
                    <Icon name="underline" size={16} />
                  </button>
                  <button onClick={() => execCommand('strikethrough')} className="p-2 hover:bg-slate-700 rounded" title="Strikethrough">
                    <Icon name="strikethrough" size={16} />
                  </button>
                  <div className="w-px h-6 bg-slate-600 mx-1" />
                  <button onClick={() => execCommand('formatBlock', '<h1>')} className="p-2 hover:bg-slate-700 rounded" title="H1">
                    <Icon name="heading-1" size={16} />
                  </button>
                  <button onClick={() => execCommand('formatBlock', '<h2>')} className="p-2 hover:bg-slate-700 rounded" title="H2">
                    <Icon name="heading-2" size={16} />
                  </button>
                  <button onClick={() => execCommand('formatBlock', '<h3>')} className="p-2 hover:bg-slate-700 rounded" title="H3">
                    <Icon name="heading-3" size={16} />
                  </button>
                  <button onClick={() => execCommand('formatBlock', '<p>')} className="p-2 hover:bg-slate-700 rounded" title="Paragraph">
                    <Icon name="pilcrow" size={16} />
                  </button>
                  <div className="w-px h-6 bg-slate-600 mx-1" />
                  <button onClick={() => execCommand('insertOrderedList')} className="p-2 hover:bg-slate-700 rounded" title="Ordered List">
                    <Icon name="list-ordered" size={16} />
                  </button>
                  <button onClick={() => execCommand('insertUnorderedList')} className="p-2 hover:bg-slate-700 rounded" title="Unordered List">
                    <Icon name="list" size={16} />
                  </button>
                  <button onClick={() => {
                    const url = prompt('Enter URL:');
                    if (url) execCommand('createLink', url);
                  }} className="p-2 hover:bg-slate-700 rounded" title="Link">
                    <Icon name="link" size={16} />
                  </button>
                  <button onClick={() => execCommand('removeFormat')} className="p-2 hover:bg-slate-700 rounded" title="Clear Format">
                    <Icon name="remove-formatting" size={16} />
                  </button>
                </div>
              )}

              {notification && (
                <div className={`fixed top-4 right-4 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50`}>
                  <Icon name={notification.type === 'success' ? 'check' : 'alert-circle'} size={20} />
                  <span>{notification.message}</span>
                </div>
              )}
            </div>
          );
        };

        ReactDOM.render(<ServiceNowKBEditor />, document.getElementById('root'));
    </script>
    
    <style>
        /* Image container styles for ServiceNow KB articles */
        .editor-content .img-container {
            margin: 1.5em 0;
            text-align: center;
        }
        
        .editor-content .img-container.img-small {
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .editor-content .img-container.img-medium {
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .editor-content .img-container.img-large {
            max-width: 100%;
        }
        
        .editor-content .img-container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }
        
        /* Placeholder for broken ServiceNow images */
        .editor-content img[src^="/sys_attachment.do"] {
            min-height: 100px;
            background: linear-gradient(135deg, #f1f5f9 25%, transparent 25%),
                        linear-gradient(225deg, #f1f5f9 25%, transparent 25%),
                        linear-gradient(45deg, #f1f5f9 25%, transparent 25%),
                        linear-gradient(315deg, #f1f5f9 25%, #e2e8f0 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
            background-repeat: repeat;
            position: relative;
        }
        
        .editor-content img[src^="/sys_attachment.do"]::after {
            content: '🖼️ ServiceNow Image (will display in ServiceNow)';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            color: #64748b;
            white-space: nowrap;
        }
    </style>
</body>
</html>
